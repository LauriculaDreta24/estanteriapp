      <rect x="55" y="30" width="16" height="40" rx="2" fill="white"/>
      <rect x="58" y="35" width="10" height="5" rx="1" fill="#E63946" fill-opacity="0.2"/>
    </g>
    
    {/* Estanteria amb suports */}
    <rect x="15" y="70" width="70" height="4" fill="white"/>
    <rect x="28" y="74" width="10" height="6" fill="white"/>
    <rect x="62" y="74" width="10" height="6" fill="white"/>
  </g>
</svg>