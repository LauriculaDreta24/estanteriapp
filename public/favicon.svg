<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#E63946"/>
  
  <g transform="translate(0, 5)">
    {/* Llibre 1: Alt i recte */}
    <rect x="32" y="15" width="18" height="55" rx="2" fill="white"/>
    <rect x="35" y="22" width="12" height="8" rx="1" fill="#E63946" fill-opacity="0.2"/>
    
    {/* Llibre 2: Més petit i inclinat */}
